<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Progress Report — Riverside Unified School District</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========= RESET ========= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; }

/* ========= IRDL TOKENS (light) ========= */
:root {
  --font-sans: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  /* Brand */
  --brand-100: #F7F4FA;
  --brand-300: #B49DD3;
  --brand-500: #573988;
  --brand-600: #462E6D;
  --brand-800: #27004B;

  /* Surfaces — IRDL Neutrals scale */
  --bg-page: #ffffff;
  --bg-surface: #ffffff;
  --bg-sunken: #f5f5f5;   /* IRDL Neutrals/surface — table headers, chart tracks, stats blocks */
  --bg-hover: #fafafa;    /* lighter than sunken — used for row & nav hover */
  --bg-info: #F7F4FA;

  /* Text — chosen for WCAG AA contrast on both white and --bg-sunken */
  --text-primary: #1a1a1a;
  --text-body: #3d3c3c;
  --text-secondary: #5e5e5e; /* IRDL Neutrals/700 — passes AA on #f5f5f5 (5.57:1) */
  --text-tertiary: #999999;  /* DECORATIVE ONLY (icons/dividers) — fails AA as text */
  --text-brand: #573988;
  --text-on-brand: #ffffff;

  /* Borders */
  --border-strong: rgba(0,0,0,0.4);
  --border: rgba(0,0,0,0.15);
  --border-soft: #ebebeb;
  --border-input: #c2c2c2;
  --border-brand: #B49DD3;

  /* Status — IRDL brand tokens
     Bar fills: Green/500 + Red/500 (vivid Ignite brand)
     Badge text: Green/700 + Red/700 (AA-legible on light bg) */
  --ok-fg: #188161;       /* Green/700 — text */
  --ok-bg: #e7fbf5;       /* Green/100 — badge bg */
  --ok-bar: #28d7a3;      /* Green/500 — bar fill */
  --ok-bar-edge: #188161; /* Green/700 — pill border / stroke */
  --warn-fg: #bd4f00;     /* Orange/700 */
  --warn-bg: #fff5ee;     /* Orange/100 */
  --bad-fg: #573988;      /* Brand purple — below-target text/icon (was Red/700) */
  --bad-bg: #F7F4FA;      /* Brand/100 — badge bg */
  --bad-bar: #573988;     /* Brand/500 — below-target bar fill (was Red/500) */
  --bad-bar-edge: #27004B;/* Brand/800 — pill border / stroke */

  /* Radius / elevation */
  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-pill: 9999px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elev: 0 2px 1px -1px rgba(43,42,42,0.2), 0 1px 1px 1px rgba(43,42,42,0.12), 0 1px 3px -3px rgba(43,42,42,0.14);

  /* Layout */
  --sidebar-w: 256px;
}

/* ========= DARK MODE TOKENS ========= */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-page: #1a1a1a;
    --bg-surface: #2b2a2a;  /* IRDL Neutrals/dark */
    --bg-sunken: #363636;   /* true neutral dark, no tan tint */
    --bg-hover: #424242;    /* lighter than sunken in dark mode too */
    --bg-info: #2d1b48;

    --text-primary: #f0efe8;
    --text-body: #d6d4cc;
    --text-secondary: #b8b8b3; /* slightly lighter for AA contrast on dark sunken */
    --text-tertiary: #8a8a85;  /* decorative only in dark mode */
    --text-brand: #C5B0E0;
    --text-on-brand: #ffffff;

    --border-strong: rgba(255,255,255,0.4);
    --border: rgba(255,255,255,0.15);
    --border-soft: #3a3a37;
    --border-input: #595956;
    --border-brand: #6E5BA8;

    --ok-fg: #97ead2;       /* Green/300 — text on dark */
    --ok-bg: #105641;       /* Green/800 — badge bg */
    --ok-bar: #28d7a3;      /* Green/500 — bar fill */
    --ok-bar-edge: #86e2c6; /* Green/400 — edge */
    --warn-fg: #ffc498;
    --warn-bg: #843802;
    --bad-fg: #C5B0E0;      /* Light brand purple — text on dark */
    --bad-bg: #2d1b48;      /* Brand-tinted dark — badge bg */
    --bad-bar: #573988;     /* Brand/500 — below-target bar fill */
    --bad-bar-edge: #B49DD3;/* Brand/300 — edge on dark */

    --shadow-card: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  }
}

html { background: var(--bg-page); }
body {
  font-family: var(--font-sans);
  color: var(--text-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ========= ACCESSIBILITY ========= */
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
.skip-link {
  position: absolute; top: -40px; left: 0; padding: 8px 16px;
  background: var(--brand-500); color: #fff; text-decoration: none;
  border-radius: 0 0 var(--r-md) 0; z-index: 1000;
}
.skip-link:focus { top: 0; }
*:focus-visible { outline: 2px solid var(--brand-500); outline-offset: 2px; border-radius: var(--r-sm); }
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ========= APP SHELL ========= */
.app { display: flex; min-height: 100vh; }

/* ----- Sidebar ----- */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border-soft);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sidebar-logo {
  padding: 20px 16px 16px;
  display: flex;
  justify-content: center;
}
.sidebar-logo img { height: 36px; width: auto; }
.sidebar-school {
  padding: 12px 16px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-brand);
  border-bottom: 1px solid var(--border-brand);
  line-height: 1.3;
}
.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section { margin-bottom: 4px; }
.nav-section-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  padding: 12px 12px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-body);
  text-decoration: none;
  border-radius: var(--r-md);
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--brand-100);
  color: var(--brand-500);
}
@media (prefers-color-scheme: dark) {
  .nav-item.active { background: var(--bg-info); color: var(--text-brand); }
}
.nav-item.active .nav-icon { color: var(--brand-500); }
@media (prefers-color-scheme: dark) {
  .nav-item.active .nav-icon { color: var(--text-brand); }
}
.nav-item.sub { padding-left: 36px; font-size: 14px; font-weight: 400; }
.nav-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--text-secondary); }
.nav-item:hover .nav-icon { color: var(--text-primary); }

.sidebar-footer {
  border-top: 1px solid var(--border-soft);
  padding: 12px 16px;
}
.user-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--brand-500); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.user-meta { display: flex; flex-direction: column; min-width: 0; }
.user-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.user-role { font-size: 12px; color: var(--text-secondary); }
.signout-btn {
  margin-top: 8px;
  background: none; border: none; padding: 6px 0; font-family: inherit;
  font-size: 14px; color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
.signout-btn:hover { color: var(--text-primary); }

/* ----- Main ----- */
.main {
  flex: 1;
  min-width: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
}
.content {
  flex: 1;
  padding: 24px 32px;
  width: 100%;
}
.site-footer {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
  padding: 16px 32px 24px;
  border-top: 1px solid var(--border-soft);
}

/* ===== Prototype-only demo banner (ESTIMATES_AVAILABLE toggle) ===== */
.demo-banner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  background: var(--bg-info);
  border-bottom: 1px solid var(--border-brand);
  padding: 10px 32px;
  font-size: 13px; color: var(--text-body);
}
.demo-banner-text { display: flex; align-items: center; gap: 8px; min-width: 0; }
.demo-banner-text svg { width: 16px; height: 16px; color: var(--text-brand); flex-shrink: 0; }
.demo-banner strong { font-weight: 600; color: var(--text-primary); }
.demo-toggle {
  display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0;
  background: none; border: none; cursor: pointer; font-family: inherit;
  font-size: 13px; color: var(--text-body); padding: 4px; border-radius: var(--r-md);
}
.demo-toggle-label { font-weight: 500; min-width: 86px; text-align: right; }
.demo-switch {
  width: 38px; height: 22px; border-radius: var(--r-pill);
  background: var(--brand-500); position: relative; flex-shrink: 0;
  transition: background 150ms;
}
.demo-toggle.off .demo-switch { background: var(--border-input); }
.demo-knob {
  position: absolute; top: 2px; left: 18px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff; transition: left 150ms;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.demo-toggle.off .demo-knob { left: 2px; }
@media (max-width: 1024px) { .demo-banner { padding: 10px 24px; } }
@media (max-width: 768px) { .demo-banner { padding: 10px 16px; } }
@media (max-width: 640px) { .demo-banner { padding: 10px 12px; } }

/* ========= REPORT HEADER ========= */
.report-header { margin-bottom: 0; }
.report-eyebrow {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-secondary);
  margin-bottom: 4px;
}

/* Sticky page-header band — keeps eyebrow, back-link, title, counts,
   and seat CTA visible while the user scrolls long content.
   The sub-counts row's bottom border doubles as this band's bottom edge,
   so no separate border-bottom here. */
.page-header-sticky {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg-page);
  /* Break out to the full width of .content, regardless of its padding. */
  margin: -24px -32px 24px;
  padding: 20px 32px 0;
}
@media (max-width: 1024px) {
  .page-header-sticky { margin: -20px -24px 20px; padding: 16px 24px 0; }
}
@media (max-width: 768px) {
  .page-header-sticky { margin: -16px -16px 16px; padding: 14px 16px 0; }
}
@media (max-width: 640px) {
  .page-header-sticky { margin: -12px -12px 12px; padding: 12px 12px 0; }
}
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; color: var(--brand-500);
  background: none; border: none; padding: 0; margin-bottom: 12px;
  cursor: pointer; font-family: inherit; font-weight: 500;
}
.back-btn:hover { text-decoration: underline; }
.back-btn svg { width: 16px; height: 16px; }

.view-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}
.view-title {
  font-size: 24px; font-weight: 600; color: var(--text-primary);
  letter-spacing: -0.3px; line-height: 1.2;
}
.view-subtitle {
  font-size: 14px; color: var(--text-secondary);
  margin-top: 4px;
}

.seats { display: flex; align-items: center; gap: 12px; flex-shrink: 0; padding-top: 4px; }
.seats-count { font-size: 14px; color: var(--text-secondary); }
.seats-filled { font-size: 14px; color: var(--text-secondary); }
.btn-primary {
  font-size: 14px; font-weight: 500;
  padding: 8px 16px; min-height: 36px;
  border-radius: var(--r-md);
  border: none; background: var(--brand-500); color: #fff;
  cursor: pointer; font-family: inherit;
  transition: background-color 150ms;
}
.btn-primary:hover { background: var(--brand-600); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.sub-counts {
  font-size: 14px; color: var(--text-secondary);
  padding: 10px 0; margin-top: 12px;
  border-top: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
}
.sub-counts span + span::before {
  content: "·"; margin: 0 10px; color: var(--text-tertiary);
}
.sub-counts strong { font-weight: 600; color: var(--text-primary); }

/* ========= GROWTH CALLOUT — hero treatment ========= */
.callout {
  background: var(--bg-surface);
  border: 2px solid var(--brand-500);
  border-radius: var(--r-lg);
  padding: 28px 32px;
  margin: 20px 0 28px;
  display: flex;
  gap: 20px;
  align-items: flex-start;
  box-shadow: 0 4px 16px rgba(87, 57, 136, 0.12), 0 1px 4px rgba(87, 57, 136, 0.08);
}
.callout-icon {
  flex-shrink: 0;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--brand-500);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}
.callout-icon svg { width: 22px; height: 22px; }
.callout-body { flex: 1; min-width: 0; }
.callout-eyebrow {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--brand-500);
  margin-bottom: 6px;
}
@media (prefers-color-scheme: dark) {
  .callout-eyebrow { color: var(--text-brand); }
}
.callout-pers {
  font-size: 20px;
  /* 1.7 (not 1.5) so the bordered <b> pills have ~10px of vertical
     breathing room when one wraps directly above another — at 1.5
     their 1.5px borders visually touch. */
  line-height: 1.7;
  color: var(--text-primary);
  font-weight: 400;
  letter-spacing: -0.2px;
}
.callout-pers b {
  font-weight: 700;
  color: var(--brand-500);
  background: var(--bg-surface);
  border: 1.5px solid var(--brand-500);
  border-radius: var(--r-md);
  /* Tightened: explicit 1.2 line-height overrides the parent's 1.7 so the
     pill doesn't inherit a 34px-tall content box. Vertical padding trimmed
     from 2px → 1px. Net pill height drops from ~41px → ~29px, opening
     ~5px of clearance against pills on adjacent wrapped lines. */
  line-height: 1.2;
  padding: 1px 10px;
  white-space: nowrap;
  display: inline-block;
  box-shadow: 0 1px 2px rgba(87,57,136,0.08);
}
@media (prefers-color-scheme: dark) {
  .callout-pers b { color: var(--text-brand); }
}
@media (max-width: 768px) {
  .callout { padding: 20px; gap: 14px; border-radius: var(--r-md); }
  .callout-icon { width: 36px; height: 36px; }
  .callout-icon svg { width: 18px; height: 18px; }
  .callout-pers { font-size: 16px; }
}

/* ========= PROJECTED CARDS ========= */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.mc {
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 16px 20px;
  box-shadow: var(--shadow-card);
}
.mc-l {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-weight: 500;
  line-height: 1.35;
  min-height: 2.7em; /* reserves room for 2-line wrap so all cards align */
}
.mc-v { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1.1; }
.mc-s { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.mc-trend {
  font-size: 12px; color: var(--ok-fg);
  margin-top: 8px; display: flex; align-items: center; gap: 4px;
}
.mc-trend svg { width: 14px; height: 14px; }
.mc-trend .pos { font-weight: 600; }

/* ========= AGGREGATE CHART CARDS ========= */
.gc {
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 20px 24px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: border-color 150ms, box-shadow 150ms;
  box-shadow: var(--shadow-card);
}
.gc:hover { border-color: var(--border-brand); box-shadow: var(--shadow-elev); }
.gc:focus-visible { outline: 2px solid var(--brand-500); outline-offset: 2px; }
.gc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.gc-name { font-size: 18px; font-weight: 600; color: var(--text-primary); }
.gc-count { font-size: 14px; color: var(--text-secondary); margin-left: 10px; font-weight: 400; }
.gc-arrow { width: 20px; height: 20px; color: var(--text-tertiary); }
/* District-card title block: stacks the school name above the count line
   so the per-grade breakdown ("35 students · 8 K · 20 1st · 7 2nd") gets
   its own row. School-view grade cards keep the inline treatment because
   their count is just one short segment. */
.gc-titles { min-width: 0; }
.gc-titles .gc-count {
  display: block;
  margin: 4px 0 0;
}
/* Mirror the page-level sub-counts treatment: bold numbers shift to
   primary text color so the value pops against the secondary-grey label. */
.gc-titles .gc-count strong { font-weight: 600; color: var(--text-primary); }

.gc-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px 28px;
}
@media (max-width: 1024px) { .gc-metrics { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .gc-metrics { grid-template-columns: 1fr; } }

/* ----- Chart (Chris's cm-* pattern, restyled to IRDL) ----- */
.cm { padding: 0; min-width: 0; }
.cm-head {
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cm-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.cm-name-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.cm-name-mark svg { width: 16px; height: 16px; }
.cm-name-mark.ok { color: var(--ok-fg); }
.cm-name-mark.bad { color: var(--bad-fg); }

.cm-bar-wrap { position: relative; margin-bottom: 10px; padding-bottom: 24px; }
.cm-bar {
  height: 20px;
  background: var(--bg-sunken);
  border-radius: 10px;
  position: relative;
  overflow: visible;
}
.cm-fill { position: absolute; top: 0; height: 100%; border-radius: 10px 0 0 10px; z-index: 2; }
.cm-proj { position: absolute; top: 0; height: 100%; z-index: 1; overflow: hidden; }
.cm-proj-i { width: 100%; height: 100%; }
.cm-target {
  position: absolute; top: -3px; height: 26px; width: 2px; border-radius: 1px;
  background: var(--text-primary); z-index: 3;
}
.cm-pill {
  position: absolute; top: 50%;
  transform: translate(-50%, -50%);
  font-size: 12px; font-weight: 600;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  padding: 1px 8px;
  z-index: 5;
  white-space: nowrap; line-height: 1.2;
  color: var(--text-primary);
}
.cm-target-pill {
  position: absolute; top: 26px;
  transform: translateX(-50%);
  font-size: 12px; font-weight: 500;
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-pill);
  padding: 1px 8px;
  z-index: 5;
  white-space: nowrap; line-height: 1.2;
  color: var(--text-secondary);
}
.cm-target-pill svg { width: 11px; height: 11px; vertical-align: -1px; margin-right: 3px; }
.cm-stats {
  text-align: center; font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-sunken);
  border-radius: var(--r-md);
  padding: 10px 12px;
}
.cm-stat { display: block; line-height: 1.5; }
.cm-stats b { font-weight: 600; color: var(--text-primary); }

/* ========= LEGEND ========= */
.legend {
  display: flex; gap: 16px; margin-bottom: 16px;
  font-size: 12px; color: var(--text-secondary);
  flex-wrap: wrap; align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-item svg { width: 12px; height: 12px; }
.ld { width: 10px; height: 10px; border-radius: 2px; }
.ll { width: 12px; height: 2.5px; border-radius: 1px; }
.ls {
  width: 18px; height: 10px; border-radius: 2px;
  background: repeating-linear-gradient(45deg, var(--text-secondary) 0 2px, transparent 2px 6px);
}

/* ========= GRADE-VIEW TOOLBAR (pinned secondary header) =========
   On Grade view, the metric toggles + legend are wrapped in .grade-toolbar
   and pin directly under the page-header-sticky band as the user scrolls. */
.grade-toolbar {
  position: sticky;
  top: var(--page-header-h, 150px);
  z-index: 40;
  background: var(--bg-page);
  padding: 16px 0;
  margin: 0;
}
.grade-toolbar > .controls-row { margin-bottom: 12px; }
.grade-toolbar > .legend { margin-bottom: 0; }

/* ========= METRIC TOGGLE ========= */
.controls-row {
  display: flex; gap: 8px; margin-bottom: 16px;
  align-items: center; flex-wrap: wrap;
}
.controls-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.controls-select {
  display: none; width: 100%; font-size: 16px;
  padding: 8px 12px; font-family: inherit;
  background: var(--bg-surface); color: var(--text-primary);
  border: 1px solid var(--border-input); border-radius: var(--r-md);
}
.tb {
  padding: 6px 14px; font-size: 14px; font-weight: 500;
  border-radius: var(--r-md);
  border: 1px solid var(--border-input);
  background: var(--bg-surface);
  color: var(--text-body);
  cursor: pointer; font-family: inherit;
  min-height: 36px;
  transition: background 150ms, color 150ms, border-color 150ms;
}
.tb:hover { border-color: var(--brand-500); color: var(--brand-500); }
.tb.active {
  background: var(--brand-500);
  color: #fff;
  border-color: var(--brand-500);
}

/* ========= STUDENT TABLE =========
   The horizontal-scroll context (.table-wrap with overflow-x: auto) is a
   sticky containing block, so position:sticky on <thead> would stick to the
   wrap's scrollport, not the viewport. To pin the column row below the
   page-header + toolbar bands, we render a separate .sticky-thead element
   OUTSIDE .table-wrap and overlap it onto the real <thead> at scroll=0
   via a negative margin-bottom (sized to thead height in JS). The real
   <thead> remains in the table for semantics. */
.table-wrap {
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-card);
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
  table-layout: fixed;
  min-width: 1000px;
}
/* Sticky fake-header: pinned to viewport below page-header + toolbar.
   Sits in flow as a sibling above .table-wrap so its sticky context is
   the page, not the table-wrap's scrollport. JS applies a negative
   margin-bottom equal to the real <thead>'s height so the two visually
   overlap at scroll=0 (no double-header). */
.sticky-thead {
  position: sticky;
  top: calc(var(--page-header-h, 150px) + var(--toolbar-h, 90px));
  z-index: 30;
  overflow: hidden;
  border-radius: var(--r-md) var(--r-md) 0 0;
  background: transparent;
}
.sticky-thead-scroll {
  width: 100%;
  will-change: transform;
}
.sticky-thead-table {
  width: 100%;
  min-width: 1000px;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
  table-layout: fixed;
}
th {
  text-align: left;
  padding: 12px 14px;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--text-secondary);
  background: var(--bg-sunken);
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer; user-select: none; white-space: nowrap;
}
th:hover { color: var(--text-primary); }
/* Round the corner cells to follow the .table-wrap's rounded border
   (now that we no longer use overflow:hidden on the wrapper). */
thead th:first-child { border-top-left-radius: var(--r-md); }
thead th:last-child { border-top-right-radius: var(--r-md); }
tbody tr:last-child td:first-child { border-bottom-left-radius: var(--r-md); }
tbody tr:last-child td:last-child { border-bottom-right-radius: var(--r-md); }
th .sa { font-size: 12px; margin-left: 4px; opacity: 0.4; }
th.sorted { color: var(--text-primary); }
th.sorted .sa { opacity: 1; color: var(--brand-500); }
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-soft);
  color: var(--text-primary);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg-hover); }
.sn { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tn { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ========= STICKY STUDENT COLUMN =========
   The table has min-width: 1000px inside an overflow-x:auto wrapper, so it
   scrolls horizontally on most viewports. Pin the Student column to the
   left so the name stays visible while the rest of the row scrolls. Cells
   need an opaque background so the columns scrolling under them don't show
   through. Hover state cascades to the sticky cell too. */
thead th:first-child {
  position: sticky;
  left: 0;
  background: var(--bg-sunken);
  z-index: 2;
}
tbody td.sn,
tbody td:first-child {
  position: sticky;
  left: 0;
  background: var(--bg-surface);
  z-index: 1;
}
tbody tr:hover td:first-child,
tbody tr:hover td.sn {
  background: var(--bg-hover);
}
/* Mirror on the sticky-fake-thead so the column header pins too — the
   translateX scroll-sync on .sticky-thead-scroll can move this cell with
   the rest, but at scrollLeft=0 (vertical-scroll-only, the common case)
   the header label stays visible above the sticky body column. */
.sticky-thead-table thead th:first-child {
  position: sticky;
  left: 0;
  background: var(--bg-sunken);
  z-index: 2;
}
.bv { text-align: right; color: var(--text-secondary); }
.cv { text-align: right; font-weight: 600; }

.bb {
  width: 100%; height: 14px;
  background: var(--bg-sunken);
  border-radius: 7px; min-width: 60px;
  overflow: visible; position: relative;
}
.bf { position: absolute; top: 0; height: 100%; border-radius: 7px 0 0 7px; z-index: 2; }
.bp { position: absolute; top: 0; height: 100%; z-index: 1; overflow: hidden; }
.bp-i { width: 100%; height: 100%; }
.bs {
  position: absolute; top: 1px; width: 12px; height: 12px;
  border-radius: 50%; background: var(--bg-surface);
  border: 2px solid; z-index: 3;
  /* No translateX — circle's left edge aligns with the solid bar's start. */
}
.bl {
  position: absolute; top: -3px; height: 20px; width: 2px;
  z-index: 3; border-radius: 1px;
  background: var(--text-primary);
}

.gv { font-size: 14px; font-weight: 600; }
.pos { color: var(--ok-fg); }
.neg { color: var(--bad-fg); }

.pc {
  font-size: 14px; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
}
.pc-status {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; flex-shrink: 0;
}
.pc-status svg { width: 14px; height: 14px; }
.pc.on-track .pc-status { color: var(--ok-fg); }
.pc.below .pc-status { color: var(--bad-fg); }

.dc { font-size: 14px; font-weight: 600; }

.mastered-cell {

.mastered-cell .mast-icon {

.mastered-cell .mast-icon svg { width: 14px; height: 14px; }

.notyet-cell {

<script>
/* =========================================================================
 * DATA ENGINE — ported verbatim from Chris's prototype (proven to work)
 * Restyled colors are read from CSS custom properties via getComputedStyle.
 * ========================================================================= */
var MO = 4, MT = 10;

// Estimated-growth (year-end projection) availability. Production estimates
// likely won't exist until mid-year, so the charts must degrade gracefully
// when they're absent. Flip to false to preview the no-estimate state:
// the projected slash, the estimated-growth pill, on-track/below status
// (colors + icons), the "% estimated to meet benchmark" stat, and the
// student-table Estimated-growth value all drop out. The growth fill stays
// green (we're still showing growth), and the benchmark tick/pill stays
// (a fixed grade-level standard, known regardless of estimates).
var ESTIMATES_AVAILABLE = true;

var GM = {
k:{name:"Kindergarten",plural:"Kindergartners",metrics:{
  wcpm:{n:"Oral Reading Fluency",t:10,b:2,mx:15,u:"ORF",cap:null,key:1},
  hfw:{n:"High-Frequency Words",t:20,b:5,mx:25,u:"high-frequency words",cap:null,key:1},
  nwf:{n:"Nonsense Word Fluency",t:28,b:10,mx:35,u:"correct letter sounds",cap:null,key:0},
  lnf:{n:"Letter Naming Fluency",t:42,b:17,mx:55,u:"letters per minute",cap:null,key:0}}},
g1:{name:"1st Grade",plural:"1st Graders",metrics:{
  wcpm:{n:"Oral Reading Fluency",t:42,b:17,mx:58,u:"ORF",cap:null,key:1},
  hfw:{n:"High-Frequency Words",t:200,b:80,mx:220,u:"high-frequency words",cap:200,key:1},
  nwf:{n:"Nonsense Word Fluency",t:58,b:27,mx:75,u:"correct letter sounds",cap:null,key:0},
  lnf:{n:"Letter Naming Fluency",t:42,b:17,mx:55,u:"letters per minute",cap:null,key:0}}},
g2:{name:"2nd Grade",plural:"2nd Graders",metrics:{
  wcpm:{n:"Oral Reading Fluency",t:90,b:40,mx:110,u:"ORF",cap:null,key:1},
  hfw:{n:"High-Frequency Words",t:200,b:120,mx:220,u:"high-frequency words",cap:200,key:1},
  nwf:{n:"Nonsense Word Fluency",t:75,b:54,mx:100,u:"correct letter sounds",cap:null,key:0},
  lnf:{n:"Letter Naming Fluency",t:42,b:17,mx:55,u:"letters per minute",cap:null,key:0}}}
};
var GKS = ['k','g1','g2'];

// ORF screener readiness floor (placeholder, pending data-team confirmation).
// Students whose BOY ORF baselines below this sit in Kindergarten Skills
// (basic alphabet knowledge) and are not yet given the ORF passage screener.
// On the ORF student table they show "Student not yet at this level".
var ORF_READINESS_FLOOR = 10;

function rng(seed){var s=seed;return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

var FN=["Ava","Ben","Chloe","Dylan","Emma","Finn","Grace","Hugo","Aiden","Bella","Carlos","Daisy","Ethan","Fatima","Gabi","Henry","Izzy","Jayden","Kayla","Liam","Maya","Noah","Olivia","Preston","Quinn","Rosa","Sam","Tiana","Alex","Brooklyn","Charlie","Diana","Eli","Freya","George","Mia","Lucas","Sophia","Leo","Zara","Aria","Owen","Luna","Jack","Nora","Theo","Ivy","Max","Lily","Ryan","Harper","Cole","Stella","Wyatt","Ruby","Asher","Hazel","Mila","Caleb","Violet","Elijah","Scarlett","Nathan","Amelia","Logan","Penny","Miles","Clara","Ezra","Willow","Isaiah","Autumn","Jude","Sienna","Kai","Margot","Ravi","Priya","Yuki","Kenji","Luca","Ines","Omar","Leila","Soren","Jasper","Iris","Felix","Ada","Rowan","Sage"];
var LN=["Anderson","Brown","Chen","Davis","Garcia","Hernandez","Johnson","Kim","Lee","Martinez","Nguyen","Patel","Robinson","Smith","Tanaka","Thompson","Vasquez","Williams","Bell","Carter","Diaz","Evans","Foster","Gomez","Hayes","Ibrahim","Jackson","Khan","Lopez","Miller","Nakamura","Park","Reyes","Singh","Torres","Walsh","Yoon","Adams","Brooks","Cohen","Dixon","Edwards","Flores","Gupta","Henderson","Ito","Jensen","Lin","Morales","Nash","Owen","Ramirez","Sato","Tran","Vega","Wong","Young","Bauer","Cruz","Doyle","Espinoza","Fischer","Hall","Joshi","Kaur","Lambert","Mehta","Ortiz","Perez","Quinn","Reed","Suzuki","Tucker","Wells","Yates","Castro","Doan","Fernandez","Gonzalez","Hassan","Iyer","Jung"];
var TN=["Ms. Rivera","Mr. Chen","Ms. Okafor","Mr. Patel","Ms. Lindgren","Mr. Davis","Ms. Tanaka","Mr. Kowalski","Ms. Hernandez","Mr. Brooks","Ms. Nguyen","Mr. Sullivan","Ms. Adeyemi","Mr. Frost","Ms. Kaplan","Mr. Reeves","Ms. Lombardi","Mr. Shah"];

var BOY_R = {
k:{wcpm:[0,2],hfw:[0,5],nwf:[1,12],lnf:[2,12]},
g1:{wcpm:[3,15],hfw:[8,38],nwf:[50,75],lnf:[35,50]},
g2:{wcpm:[20,45],hfw:[60,120],nwf:[75,95],lnf:[42,50]}
};

function genStudents(r,n,gk){
  var mks=Object.keys(GM[gk].metrics);
  var nTeachers=Math.max(1,Math.ceil(n/20));
  var teachers=[];var usedT={};
  for(var ti=0;ti<nTeachers;ti++){var tn;do{tn=TN[Math.floor(r()*TN.length)]}while(usedT[tn]);usedT[tn]=true;teachers.push(tn)}
  var used={};var students=[];
  for(var i=0;i<n;i++){
    var nm;do{nm=FN[Math.floor(r()*FN.length)]+' '+LN[Math.floor(r()*LN.length)];}while(used[nm]);
    used[nm]=true;
    var s={name:nm,teacher:teachers[i%nTeachers]};
    // Instructional hours in the Ignite program (placeholder, pending real
    // data). Derived deterministically from index so it doesn't consume the
    // shared RNG and shift the seeded scores. Cycles 12-18, averaging ~15.
    s.hours=12+((i*3)%7);
    mks.forEach(function(mk){
      var met=GM[gk].metrics[mk];
      if(met.t===null){s[mk]={b:0,c:Math.floor(r()*(met.mx+1))};return}
      var br=BOY_R[gk][mk];
      var boy=Math.round(br[0]+r()*(br[1]-br[0]));
      if(boy>=met.t){s[mk]={b:boy,c:boy,mastered:true};return}
      var thr=boy+(met.t-boy)*0.4;
      var cur;
      if(r()<0.68){
        var hi=met.cap?Math.min(met.cap,met.t*0.85):met.t*0.85;
        cur=Math.round(thr+r()*Math.max(hi-thr,3));
      }else{
        cur=Math.round(boy+1+r()*Math.max(thr-boy-2,1));
      }
      if(met.cap)cur=Math.min(cur,met.cap);
      cur=Math.max(boy+1,cur);
      s[mk]={b:boy,c:cur};
    });
    students.push(s);
  }
  return students;
}

var DISTRICT_NAME = "Riverside Unified School District";
var DMET = {k:'wcpm',g1:'wcpm',g2:'wcpm'};

var SCFG = [

function statusMark(status){
  // Non-color status cue — small icon next to the metric title.
  // Pairs with bar color to satisfy WCAG 1.4.1 (Use of Color).
  var cls = status === 'on-track' ? 'ok' : 'bad';
  var icon = status === 'on-track' ? ICON_CHECK : ICON_WARN;
  var label = status === 'on-track' ? 'On track' : 'Below benchmark';
  return '<span class="cm-name-mark '+cls+'" role="img" aria-label="'+label+'" title="'+label+'">'+icon+'</span>';
}

/* =========================================================================
 * MOP / aggregation / callout helpers (verbatim Chris)
 * ========================================================================= */
function mopStudent(boy,cur,target,totalMonths){
  if(target==null)return null;
  if(target<=boy)return totalMonths;
  var frac=Math.max(0,(cur-boy)/(target-boy));
  return Math.min(totalMonths,frac*totalMonths);
}

function calloutFor(scope,metricKeys){
  var perMetric={};var allMops=[];
  metricKeys.forEach(function(mk){perMetric[mk]=[]});
  scope.forEach(function(it){
    var g=GM[it.gk];
    metricKeys.forEach(function(mk){
      var m=g.metrics[mk];if(!m)return;
      var d=it.student[mk];if(!d)return;
      var cur=m.cap!=null?Math.min(d.c,m.cap):d.c;
      perMetric[mk].push(cur-d.b);
      var mop=mopStudent(d.b,cur,m.t,MT);
      if(mop!=null)allMops.push(mop);
    });
  });
  var r={count:scope.length,avgMonths:0,growths:{}};
  if(allMops.length)r.avgMonths=Math.round(allMops.reduce(function(a,b){return a+b},0)/allMops.length);
  metricKeys.forEach(function(mk){
    var arr=perMetric[mk];
    r.growths[mk]=arr.length?Math.round(arr.reduce(function(a,b){return a+b},0)/arr.length):0;
  });
  return r;
}

function avgMopFor(scope){
  var mops=[];
  scope.forEach(function(it){
    var g=GM[it.gk];
    Object.keys(g.metrics).forEach(function(mk){
      var m=g.metrics[mk];if(!m.key||m.t==null)return;
      var d=it.student[mk];if(!d)return;
      var cur=m.cap!=null?Math.min(d.c,m.cap):d.c;
      var mop=mopStudent(d.b,cur,m.t,MT);
      if(mop!=null)mops.push(mop);
    });
  });
  return mops.length?Math.round(mops.reduce(function(a,b){return a+b},0)/mops.length):0;
}

// Average instructional hours per student in scope (placeholder data — see
// genStudents). Used by the Growth Highlight statement.
function avgHoursFor(scope){
  if(!scope.length)return 0;
  var sum=scope.reduce(function(a,it){return a+(it.student.hours||0)},0);
  return Math.round(sum/scope.length);
}

function calloutHtml(personalHtml){
  if(!personalHtml)return '';
  return '<div class="callout" role="region" aria-label="Growth highlight">'
    +'<div class="callout-icon" aria-hidden="true">'+ICON_TRENDING_UP+'</div>'
    +'<div class="callout-body">'
    +'<div class="callout-eyebrow">Growth Highlight</div>'
    +'<p class="callout-pers">'+personalHtml+'</p>'
    +'</div></div>';
}

function seatsBlock(seats){
  if(seats>0)return '<div class="seats"><span class="seats-count">'+seats+' open seat'+(seats!==1?'s':'')+'</span><button class="btn-primary" type="button">Fill Seats</button></div>';
  return '<div class="seats"><span class="seats-filled">All seats filled</span></div>';
}

function metricAgg(scope,mk){
  var boys=[],currs=[],projs=[],targets=[],growths=[],mx=0,projMet=0;
  scope.forEach(function(it){
    var m=GM[it.gk].metrics[mk];if(!m||m.t==null)return;
    var d=gsd(it.student,it.gk,mk);if(!d)return;
    boys.push(d.boy);currs.push(d.current);projs.push(d.projected);targets.push(m.t);
    if(!d.mastered)growths.push(d.growth);
    if(d.mastered||d.projected>=m.t)projMet++;
    if(m.mx>mx)mx=m.mx;
  });
  if(!boys.length)return null;
  function avg(a){return a.length?a.reduce(function(x,y){return x+y},0)/a.length:0}
  return{
    boy:Math.round(avg(boys)),current:Math.round(avg(currs)),
    projected:Math.round(avg(projs)),target:Math.round(avg(targets)),
    growth:Math.round(avg(growths)),projPct:Math.round(projMet/boys.length*100),
    mx:mx,count:boys.length
  };
}

function pickVisiblePills(specs){
  var threshold=14;var visible=[];
  specs.forEach(function(p){
    var collides=visible.some(function(v){return Math.abs(v.pct-p.pct)<threshold});
    if(!collides)visible.push(p);
  });
  return visible;
}

/* =========================================================================
 * RENDER: aggregate metric chart  (Chris's structure, IRDL colors)
 * ========================================================================= */
// showTarget: District aggregate charts omit targets/status (growth only);
// School charts pass true to restore the EOY target tick + target pill, the
// on-track/below status coloring + status icon, and the "% trending to meet
// target" stat.
function renderMetricChart(stats,title,showTarget){
  if(!stats||!stats.mx)return '<div class="cm"><div class="cm-head"><div class="cm-name">'+title+'</div></div><div class="cm-stats" style="font-style:italic">No data</div></div>';
  var est=ESTIMATES_AVAILABLE;
  var mx=stats.mx;
  var bp=Math.max(0,Math.min(100,stats.boy/mx*100));
  var cp=Math.min(100,stats.current/mx*100);
  var pp=Math.min(100,stats.projected/mx*100);
  var tp=Math.min(100,stats.target/mx*100);
  var status=stats.projected>=stats.target?'on-track':'below';
  // Status coloring/icons only when an estimate exists AND the view shows
  // benchmarks. Without an estimate the fill stays green (growth color).
  var showStatus=est&&showTarget;
  var col=showStatus?statusBarColor(status):aggBarColor();
  var bord=showStatus?statusBorderColor(status):aggBarEdge();
  var pillSpecs=[{key:'start',pct:bp,label:stats.boy,full:'Start: '+stats.boy}];
  if(est)pillSpecs.push({key:'trending',pct:pp,label:stats.projected,full:'Estimated growth: '+stats.projected});
  pillSpecs.push({key:'current',pct:cp,label:stats.current,full:'Current: '+stats.current});
  var visible=pickVisiblePills(pillSpecs);

  var head=showStatus?(statusMark(status)+'<div class="cm-name">'+title+'</div>'):'<div class="cm-name">'+title+'</div>';
  var h='<div class="cm"><div class="cm-head">'+head+'</div>';
  h+='<div class="cm-bar-wrap"><div class="cm-bar">';
  if(est&&pp>cp)h+='<div class="cm-proj" style="left:'+cp+'%;width:'+(pp-cp)+'%"><div class="cm-proj-i" style="background:'+slBg(col)+'"></div></div>';
  h+='<div class="cm-fill" style="left:'+bp+'%;width:'+Math.max(0,cp-bp)+'%;background:'+col+'"></div>';
  if(showTarget)h+='<div class="cm-target" style="left:'+tp+'%"></div>';
  visible.forEach(function(p){
    h+='<div class="cm-pill" style="left:'+p.pct+'%;border-color:'+bord+'" title="'+p.full+'">'+p.label+'</div>';
  });
  h+='</div>';
  if(showTarget)h+='<div class="cm-target-pill" style="left:'+tp+'%" title="Benchmark: '+stats.target+'">'+ICON_FLAG+stats.target+'</div>';
  h+='</div>';
  var gSign=stats.growth>=0?'+':'';
  h+='<div class="cm-stats"><span class="cm-stat"><b>'+gSign+stats.growth+'</b> average growth</span>';
  if(showStatus)h+='<span class="cm-stat"><b>'+stats.projPct+'%</b> estimated to meet benchmark</span>';
  h+='</div>';
  h+='</div>';
  return h;
}

function renderMonthsChart(months,showTarget){
  // Months of growth. School (showTarget) shows the full-year benchmark tick.
  // The estimated year-end slash/pill/stat appear only when estimates exist.
  var est=ESTIMATES_AVAILABLE;
  var trending=Math.round(months*MT/MO);
  var mx=Math.round(MT*1.5);
  var cp=Math.min(100,months/mx*100);
  var pp=Math.min(100,trending/mx*100);
  var tp=MT/mx*100;
  var status=trending>=MT?'on-track':'below';
  var showStatus=est&&showTarget;
  var col=showStatus?statusBarColor(status):aggBarColor();
  var bord=showStatus?statusBorderColor(status):aggBarEdge();

  var head=showStatus?(statusMark(status)+'<div class="cm-name">Months of Growth</div>'):'<div class="cm-name">Months of Growth</div>';
  var h='<div class="cm"><div class="cm-head">'+head+'</div>';
  h+='<div class="cm-bar-wrap"><div class="cm-bar">';
  if(est&&pp>cp)h+='<div class="cm-proj" style="left:'+cp+'%;width:'+(pp-cp)+'%"><div class="cm-proj-i" style="background:'+slBg(col)+'"></div></div>';
  h+='<div class="cm-fill" style="left:0%;width:'+cp+'%;background:'+col+'"></div>';
  if(showTarget)h+='<div class="cm-target" style="left:'+tp+'%"></div>';
  var pillSpecs=[{key:'current',pct:cp,label:months+' mo.',full:'Current: '+months+' months of growth'}];
  if(est)pillSpecs.unshift({key:'trending',pct:pp,label:trending+' mo.',full:'Estimated growth: '+trending+' months of growth'});
  var pills=pickVisiblePills(pillSpecs);
  pills.forEach(function(p){h+='<div class="cm-pill" style="left:'+p.pct+'%;border-color:'+bord+'" title="'+p.full+'">'+p.label+'</div>'});
  h+='</div>';
  if(showTarget)h+='<div class="cm-target-pill" style="left:'+tp+'%" title="Benchmark: '+MT+' months (full year of growth)">'+ICON_FLAG+MT+' mo.</div>';
  h+='</div>';
  var monthsStat=est?('estimated <b>'+trending+' months</b> of growth by year-end'):('<b>'+months+' months</b> of growth so far');
  h+='<div class="cm-stats"><span class="cm-stat">'+monthsStat+'</span></div>';
  h+='</div>';
  return h;
}

function trendFor(value){return Math.max(1,Math.round(value*0.05))}

function projCard(label,value,subtitle){
  var t=trendFor(value);
  return '<div class="mc"><div class="mc-l">'+label+'</div><div class="mc-v">'+value+'</div><div class="mc-s">'+subtitle+'</div><div class="mc-trend">'+ICON_TRENDING_UP+'<span class="pos">+'+t+'</span> since last week</div></div>';
}

function metricCards(scope){
  var w=metricAgg(scope,'wcpm');var f=metricAgg(scope,'hfw');
  var h='<div class="metrics-row">';
  if(ESTIMATES_AVAILABLE){
    // Year-end estimate from data to date.
    var projMonths=Math.round(avgMopFor(scope)*MT/MO);
    h+=projCard('Current Months of Growth Estimate',projMonths,'by year-end');
    h+=projCard('Current Oral Reading Fluency Estimate',w?w.projected:0,'by year-end');
    h+=projCard('Current High-Frequency Words Estimate',f?f.projected:0,'by year-end');
  }else{
    // No estimate yet: fall back to current values to date.
    h+=projCard('Current Months of Growth',avgMopFor(scope),'to date');
    h+=projCard('Current Oral Reading Fluency',w?w.current:0,'to date');
    h+=projCard('Current High-Frequency Words',f?f.current:0,'to date');
  }
  h+='</div>';
  return h;
}

// Shared legend — used on District, School, and Grade views so the visual
// vocabulary (status colors + target tick + projected stripe) is documented
// next to every chart.
// full=true (grade student table): on-track/below status + EOY target + trending stripe.
// full=false (district/school aggregate): growth-only — no status, no target.
function chartLegend(full){
  var est=ESTIMATES_AVAILABLE;
  var h='<div class="legend" aria-label="Chart legend">';
  if(full){
    // School/grade: status (on-track/below) only when an estimate drives it.

        +'<div class="legend-item"><div class="ld" style="background:var(--bad-bar)"></div> Below benchmark</div>';
    }else{
      h+='<div class="legend-item"><div class="ld" style="background:var(--ok-bar)"></div> Growth so far</div>';
    }

    if(est)h+='<div class="legend-item"><div class="ls"></div> Estimated growth</div>';

function gsd(student,gk,mk){
  var m=GM[gk].metrics[mk];var d=student[mk];if(!d)return null;
  if(d.mastered){
    return{name:student.name,teacher:student.teacher,current:d.c,boy:d.b,growth:0,projected:d.c,cs:'on-track',ps:'on-track',delta:m.t!==null?d.c-m.t:null,mastered:true}}
  var cur=m.cap!==null?Math.min(d.c,m.cap):d.c;var gr=cur-d.b;
  var pr=m.t!==null?proj(d.b,cur,m.cap):null;
  var s2=m.t!==null?(pr>=m.t?'on-track':'below'):'on-track';
  var dl=m.t!==null?pr-m.t:null;
  return{name:student.name,teacher:student.teacher,current:cur,boy:d.b,growth:gr,projected:pr,cs:s2,ps:s2,delta:dl,mastered:false}}

function gradeStats(si,gk,mk){
  var m=GM[gk].metrics[mk];var students=SCHOOLS[si].students[gk];
  var all=students.map(function(s){return gsd(s,gk,mk)}).filter(Boolean);
  if(!all.length)return{avg:0,avgGr:0,projMet:0,projPct:0,total:0};
  var avg=Math.round(all.reduce(function(a,d){return a+d.current},0)/all.length);
  var working=all.filter(function(d){return !d.mastered});
  var avgGr=working.length?Math.round(working.reduce(function(a,d){return a+d.growth},0)/working.length):0;
  var projMet=m.t!==null?all.filter(function(d){return d.projected>=m.t}).length:0;
  var projPct=m.t!==null?Math.round(projMet/all.length*100):0;
  return{avg:avg,avgGr:avgGr,projMet:projMet,projPct:projPct,total:all.length}}

function schoolGrades(si){return GKS.filter(function(gk){return SCHOOLS[si].students[gk].length>0})}

function schoolStats(si){
  var total=0,pm=0,pt=0;
  schoolGrades(si).forEach(function(gk){
    var s=gradeStats(si,gk,DMET[gk]);
    pm+=s.projMet;pt+=s.total;
    total+=SCHOOLS[si].students[gk].length;
  });
  return{total:total,projMet:pm,projTot:pt,projPct:pt?Math.round(pm/pt*100):0}}

function renderDistrict(){
  var app=document.getElementById('app');
  var total=0,allPm=0,allPt=0,totalSeats=0;
  SCHOOLS.forEach(function(sch,i){
    var ss=schoolStats(i);total+=ss.total;allPm+=ss.projMet;allPt+=ss.projTot;totalSeats+=sch.seats;
  });
  var gTotals={k:0,g1:0,g2:0};
  SCHOOLS.forEach(function(sch){GKS.forEach(function(gk){gTotals[gk]+=sch.students[gk].length})});

  var h='<div class="page-header-sticky"><div class="report-eyebrow">Reports · Student Progress</div><div class="report-header"><div class="view-head"><div><h1 class="view-title">'+DISTRICT_NAME+'</h1><p class="view-subtitle">'+SCHOOLS.length+' schools · K–2 reading progress</p></div>'+seatsBlock(totalSeats)+'</div>';
  h+='<div class="sub-counts"><span><strong>'+total+'</strong> students</span>';
  GKS.forEach(function(gk){if(gTotals[gk]>0)h+='<span><strong>'+gTotals[gk]+'</strong> '+GM[gk].plural+'</span>'});
  h+='</div></div></div>';

  var dScope=[];SCHOOLS.forEach(function(sch){GKS.forEach(function(gk){sch.students[gk].forEach(function(s){dScope.push({student:s,gk:gk})})})});
  var dCs=calloutFor(dScope,['wcpm','hfw']);
  var dHours=avgHoursFor(dScope);
  var dPers=dScope.length?'Your students have made <b>'+dCs.avgMonths+' months</b> of progress in <b>'+dHours+' instructional hours</b>, improving oral reading fluency by <b>'+dCs.growths.wcpm+' more</b> words and mastering <b>'+dCs.growths.hfw+' more</b> high-frequency words on average.':'';
  h+=calloutHtml(dPers);
  h+=metricCards(dScope);
  h+=chartLegend(false);

  // Render schools alphabetically; preserve the original index (si) so navigation,
  // state, and per-school seeds stay stable.
  var orderedSchools = SCHOOLS.map(function(sch,i){return{sch:sch,si:i}})
    .sort(function(a,b){return a.sch.name.localeCompare(b.sch.name)});
  orderedSchools.forEach(function(item){
    var sch=item.sch, i=item.si;
    var ss=schoolStats(i);
    var schAllScope=[];GKS.forEach(function(gk){sch.students[gk].forEach(function(s){schAllScope.push({student:s,gk:gk})})});
    var schMonths=avgMopFor(schAllScope);
    var schWcpm=metricAgg(schAllScope,'wcpm');
    var schHfw=metricAgg(schAllScope,'hfw');
    // Count line: total + per-grade breakdown. Label-first format
    // ("K: 11" not "11 K") so the labels act as fixed anchors and the
    // eye can jump straight to a value. Bold numbers mirror the
    // page-level sub-counts pattern and give the values visual weight.
    // Grades with 0 students are skipped (e.g. Jefferson has no K).
    var countParts=['<strong>'+ss.total+'</strong> students'];
    GKS.forEach(function(gk){
      var n=sch.students[gk].length;
      if(n>0){
        var label=gk==='k'?'K':(gk==='g1'?'1st':'2nd');
        countParts.push('<strong>'+n+'</strong> '+label);
      }
    });
    var countStr=countParts.join(' · ');
    h+='<div class="gc" role="button" tabindex="0" onclick="navTo(\'school\','+i+')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();navTo(\'school\','+i+')}">';
    h+='<div class="gc-head"><div class="gc-titles"><div class="gc-name">'+sch.name+'</div><div class="gc-count">'+countStr+'</div></div>'+ICON_CHEVRON_R.replace('aria-hidden="true"','class="gc-arrow" aria-hidden="true"')+'</div><div class="gc-metrics">';
    h+=renderMonthsChart(schMonths);
    h+=renderMetricChart(schWcpm,'Oral Reading Fluency');
    h+=renderMetricChart(schHfw,'High-Frequency Words');
    h+='</div></div>';
  });
  app.innerHTML=h;
}

/* =========================================================================
 * VIEW: SCHOOL
 * ========================================================================= */
function renderSchool(si){
  var app=document.getElementById('app');
  var sch=SCHOOLS[si];var ss=schoolStats(si);
  var h='<div class="page-header-sticky"><div class="report-eyebrow">Reports · Student Progress</div><div class="report-header"><button class="back-btn" onclick="navTo(\'district\')">'+ICON_ARROW_LEFT+' '+DISTRICT_NAME+'</button>';
  h+='<div class="view-head"><div><h1 class="view-title">'+sch.name+'</h1><p class="view-subtitle">School-level reading progress</p></div>'+seatsBlock(sch.seats)+'</div>';
  var sg=schoolGrades(si);
  h+='<div class="sub-counts"><span><strong>'+ss.total+'</strong> students</span>';
  sg.forEach(function(gk){h+='<span><strong>'+sch.students[gk].length+'</strong> '+GM[gk].plural+'</span>'});
  h+='</div></div></div>';

  var schScope=[];GKS.forEach(function(gk){sch.students[gk].forEach(function(s){schScope.push({student:s,gk:gk})})});
  var schCs=calloutFor(schScope,['wcpm','hfw']);
  var schHours=avgHoursFor(schScope);
  var schPers=schScope.length?'Your students have made <b>'+schCs.avgMonths+' months</b> of progress in <b>'+schHours+' instructional hours</b>, improving oral reading fluency by <b>'+schCs.growths.wcpm+' more</b> words and mastering <b>'+schCs.growths.hfw+' more</b> high-frequency words on average.':'';
  h+=calloutHtml(schPers);
  h+=metricCards(schScope);
  h+=chartLegend(true);

  sg.forEach(function(gk){
    var g=GM[gk];
    var gScope=sch.students[gk].map(function(s){return{student:s,gk:gk}});
    var gMonths=avgMopFor(gScope);
    var gWcpm=metricAgg(gScope,'wcpm');
    var gHfw=metricAgg(gScope,'hfw');
    h+='<div class="gc" role="button" tabindex="0" onclick="navTo(\'grade\','+si+',\''+gk+'\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();navTo(\'grade\','+si+',\''+gk+'\')}">';
    h+='<div class="gc-head"><div><span class="gc-name">'+g.name+'</span><span class="gc-count">'+sch.students[gk].length+' students</span></div>'+ICON_CHEVRON_R.replace('aria-hidden="true"','class="gc-arrow" aria-hidden="true"')+'</div><div class="gc-metrics">';
    h+=renderMonthsChart(gMonths,true);
    h+=renderMetricChart(gWcpm,'Oral Reading Fluency',true);
    h+=renderMetricChart(gHfw,'High-Frequency Words',true);
    h+='</div></div>';
  });
  app.innerHTML=h;
}

/* =========================================================================
 * VIEW: GRADE (student table)
 * ========================================================================= */
function renderGrade(si,gk){
  var app=document.getElementById('app');
  var sch=SCHOOLS[si];var g=GM[gk];var mk=st.gm[si][gk];var m=g.metrics[mk];var hasTarget=m.t!==null;
  var keys=Object.keys(g.metrics);
  var data=sch.students[gk].map(function(s){return gsd(s,gk,mk)}).filter(Boolean);

  var h='<div class="page-header-sticky"><div class="report-eyebrow">Reports · Student Progress</div><div class="report-header"><button class="back-btn" onclick="navTo(\'school\','+si+')">'+ICON_ARROW_LEFT+' '+sch.name+'</button>';
  h+='<div class="view-head"><div><h1 class="view-title">'+sch.name+' — '+g.name+'</h1><p class="view-subtitle">Student-level reading progress</p></div></div>';
  h+='<div class="sub-counts"><span><strong>'+data.length+'</strong> '+g.plural+'</span></div></div></div>';

  var gScope=sch.students[gk].map(function(s){return{student:s,gk:gk}});
  var gCs=calloutFor(gScope,['wcpm','hfw']);
  var gHours=avgHoursFor(gScope);
  var gPers;
  if(gScope.length===0){gPers='';}
  else{var gLabel=gk==='k'?'kindergartners':(gk==='g1'?'1st graders':'2nd graders');gPers='Your '+gLabel+' have made <b>'+gCs.avgMonths+' months</b> of progress in <b>'+gHours+' instructional hours</b>, improving oral reading fluency by <b>'+gCs.growths.wcpm+' more</b> words and mastering <b>'+gCs.growths.hfw+' more</b> high-frequency words on average.';}
  h+=calloutHtml(gPers);
  h+=metricCards(gScope);

  // Toolbar wraps the metric toggles + legend so they pin together under the page header.
  h+='<div class="grade-toolbar">';
  h+='<div class="controls-row" role="tablist" aria-label="Metric"><div class="controls-buttons">';
  keys.forEach(function(k){var mi=g.metrics[k];h+='<button class="tb'+(k===mk?' active':'')+'" role="tab" aria-selected="'+(k===mk?'true':'false')+'" data-mk="'+k+'" data-si="'+si+'" data-gk="'+gk+'">'+mi.n+'</button>'});
  h+='</div>';
  h+='<select class="controls-select" id="metricSelect" aria-label="Choose metric">';
  keys.forEach(function(k){var mi=g.metrics[k];h+='<option value="'+k+'"'+(k===mk?' selected':'')+'>'+mi.n+'</option>'});
  h+='</select>';
  h+='</div>';

  h+=chartLegend(true);
  h+='</div>'; // /.grade-toolbar

  // Build thead HTML once — reused in both the sticky fake-header and the real table.
  // Both have the same width constraints (width: 100%; min-width: 1000px) and column
  // widths, so their cells align column-for-column.
  // Rebalance: name & bar do the most work; numeric columns trim to fit content.
  // vs. Benchmark column removed; widths rebalanced across the remaining 7
  // columns. (All metrics have benchmarks, so the Trending to EOY column
  // always renders.)
  var cN='20%',cT='13%',cS='7%',cCu='8%',cCh='28%',cG='8%',cP='16%';
  var theadInner='<tr><th style="width:'+cN+'" data-sort="name">Student <span class="sa">&#9650;</span></th><th style="width:'+cT+'" data-sort="teacher">Teacher <span class="sa">&#9650;</span></th><th style="width:'+cS+';text-align:right" data-sort="boy">Start <span class="sa">&#9650;</span></th><th style="width:'+cCu+';text-align:right" data-sort="current">Current <span class="sa">&#9650;</span></th><th style="width:'+cCh+'" aria-label="Progress"></th><th style="width:'+cG+';text-align:right" data-sort="growth">Growth <span class="sa">&#9650;</span></th>';
  if(hasTarget)theadInner+='<th style="width:'+cP+';text-align:right" data-sort="projected">Estimated growth <span class="sa">&#9650;</span></th>';
  theadInner+='</tr>';

  // Sticky fake-header — pinned to viewport, overlaps real thead at scroll=0.
  h+='<div class="sticky-thead" id="sticky-thead" aria-hidden="true">';
  h+='<div class="sticky-thead-scroll" id="sticky-thead-scroll">';
  h+='<table class="sticky-thead-table"><thead>'+theadInner+'</thead></table>';
  h+='</div></div>';

  // Real table — its <thead> stays for semantics; visually overlapped by sticky-thead.
  h+='<div class="table-wrap" id="table-wrap"><table>';
  h+='<thead>'+theadInner+'</thead><tbody id="tb"></tbody></table></div>';
  app.innerHTML=h;
  bindGradeEvents(si,gk);
  renderRows(si,gk);
}

function renderRows(si,gk){
  var mk=st.gm[si][gk];var m=GM[gk].metrics[mk];var hasTarget=m.t!==null;
  var est=ESTIMATES_AVAILABLE;
  var data=SCHOOLS[si].students[gk].map(function(s){return gsd(s,gk,mk)}).filter(Boolean);
  // "Not yet at this level": on the ORF table only, students whose BOY ORF
  // baselines below the screener-readiness floor (Kindergarten Skills).
  data.forEach(function(d){d.notYet = (mk==='wcpm' && !d.mastered && d.boy < ORF_READINESS_FLOOR);});
  // Group order: working students first (actionable), then not-yet, then
  // baselined-higher at the bottom — regardless of the active sort column.
  function grp(d){return d.mastered?2:(d.notYet?1:0);}
  data.sort(function(a,b){
    var ga=grp(a),gb=grp(b);
    if(ga!==gb)return ga-gb;
    var va=a[st.sort],vb=b[st.sort];
    if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase()}
    if(va<vb)return st.asc?-1:1;
    if(va>vb)return st.asc?1:-1;
    return 0;
  });
  var tPct=hasTarget?Math.round(m.t/m.mx*100):0;
  var rows='';
  data.forEach(function(d){
    if(d.notYet){
      rows+='<tr><td class="sn">'+d.name+'</td><td class="tn">'+d.teacher+'</td>';
      rows+='<td colspan="5" class="notyet-cell"><span class="notyet-icon">'+ICON_DASH+' Student not yet at this level</span></td>';
      rows+='</tr>';
      return;
    }
    if(d.mastered){
      rows+='<tr><td class="sn">'+d.name+'</td><td class="tn">'+d.teacher+'</td>';
      rows+='<td colspan="5" class="mastered-cell"><span class="mast-icon">'+ICON_CHECK+' Baselined higher at initial assessment</span></td>';
      rows+='</tr>';
      return;
    }
    var bPct=Math.max(0,Math.min(100,Math.round(d.boy/m.mx*100)));
    var cPct=Math.min(100,Math.round(d.current/m.mx*100));
    var pPct=hasTarget?Math.min(100,Math.round(d.projected/m.mx*100)):0;
    var gSign=d.growth>=0?'+':'';var gCl=d.growth>=0?'pos':'neg';
    // Without an estimate: no projected slash, fill stays green (growth color).
    var bCol=est?statusBarColor(d.cs):aggBarColor();
    rows+='<tr><td class="sn">'+d.name+'</td><td class="tn">'+d.teacher+'</td>';
    rows+='<td class="bv">'+d.boy+'</td>';
    rows+='<td class="cv">'+d.current+'</td>';
    rows+='<td><div class="bb">';
    if(est&&hasTarget&&pPct>cPct)rows+='<div class="bp" style="left:'+cPct+'%;width:'+(pPct-cPct)+'%"><div class="bp-i" style="background:'+slBg(bCol)+'"></div></div>';
    rows+='<div class="bf" style="left:'+bPct+'%;width:'+Math.max(0,cPct-bPct)+'%;background:'+bCol+'"></div>';
    rows+='<div class="bs" style="left:'+bPct+'%;border-color:'+bCol+'"></div>';
    if(hasTarget)rows+='<div class="bl" style="left:'+tPct+'%"></div>';
    rows+='</div></td>';
    rows+='<td style="text-align:right"><span class="gv '+gCl+'">'+gSign+d.growth+'</span></td>';
    if(hasTarget){
      if(est){
        var psCl=d.ps==='on-track'?'on-track':'below';
        var psIcon=d.ps==='on-track'?ICON_CHECK:ICON_WARN;
        rows+='<td style="text-align:right"><span class="pc '+psCl+'"><span class="pc-status">'+psIcon+'</span>'+d.projected+'</span></td>';
      }else{
        rows+='<td style="text-align:right;color:var(--text-tertiary)">&mdash;</td>';
      }
    }
    rows+='</tr>';
  });
  document.getElementById('tb').innerHTML=rows;
  document.querySelectorAll('th').forEach(function(th){
    th.classList.toggle('sorted',th.dataset.sort===st.sort);
    var a=th.querySelector('.sa');
    if(a)a.innerHTML=(th.dataset.sort===st.sort&&!st.asc)?'&#9660;':'&#9650;';
  });
}

function bindGradeEvents(si,gk){
  // Metric pill / dropdown re-renders go through render() (not renderGrade
  // directly) so applyStickyOffsets() runs afterward and re-applies the
  // negative margin that overlaps the sticky-thead onto the real thead.
  // Without this, switching metrics produces two visible header rows.
  document.querySelectorAll('.tb').forEach(function(btn){
    btn.addEventListener('click',function(){st.gm[si][gk]=btn.dataset.mk;st.sort='name';st.asc=true;st.filter='all';render()});
  });
  var sel=document.getElementById('metricSelect');
  if(sel)sel.addEventListener('change',function(){st.gm[si][gk]=sel.value;st.sort='name';st.asc=true;st.filter='all';render()});
  // Sort click handlers fire on both real and sticky thead cells (selector
  // matches both). Whichever is on top intercepts the click; both update
  // their sort arrows via the renderRows() loop over all <th>s.
  document.querySelectorAll('th[data-sort]').forEach(function(th){
    th.addEventListener('click',function(){var col=th.dataset.sort;if(st.sort===col)st.asc=!st.asc;else{st.sort=col;st.asc=true}renderRows(si,gk)});
  });
  // Sync horizontal scroll: when the user scrolls .table-wrap right, translate
  // the sticky-thead's inner table left by the same amount so columns align.
  // The sticky-thead's first cell (the Student column header) needs to STAY
  // at viewport-left to mirror the body's sticky first column, so we counter-
  // translate it by +scrollLeft to cancel out the parent's translation.
  var tw=document.getElementById('table-wrap');
  var ss=document.getElementById('sticky-thead-scroll');
  var stickyFirstTh=ss?ss.querySelector('thead th:first-child'):null;
  if(tw&&ss){
    tw.addEventListener('scroll',function(){
      var x=tw.scrollLeft;
      ss.style.transform='translateX('+(-x)+'px)';
      if(stickyFirstTh)stickyFirstTh.style.transform='translateX('+x+'px)';
    });
  }
}

window.navTo=function(view,si,gk){
  st.view=view;st.si=si!==undefined?si:null;st.gk=gk||null;
  st.sort='name';st.asc=true;st.filter='all';
  render();
  document.getElementById('main-content').scrollIntoView({behavior:'smooth',block:'start'});
};

function render(){
  if(st.view==='district')renderDistrict();
  else if(st.view==='school')renderSchool(st.si);
  else renderGrade(st.si,st.gk);
  applyStickyOffsets();
}

// Prototype-only: flip the estimate-availability flag and re-render the
// current view so reviewers can compare the with/without-estimate states.
window.toggleEstimates=function(){
  ESTIMATES_AVAILABLE=!ESTIMATES_AVAILABLE;
  var btn=document.getElementById('demo-toggle');
  if(btn){
    btn.setAttribute('aria-checked',ESTIMATES_AVAILABLE?'true':'false');
    btn.classList.toggle('off',!ESTIMATES_AVAILABLE);
    var lbl=btn.querySelector('.demo-toggle-label');
    if(lbl)lbl.textContent=ESTIMATES_AVAILABLE?'Estimates on':'Estimates off';
  }
  render();
};

// Measure pinned-band heights and expose as CSS variables so subsequent
// sticky layers (.grade-toolbar, .sticky-thead) can stack beneath them
// without hardcoded pixel math. Also overlap the sticky-thead onto the
// real thead via negative margin so we don't render two visible header
// rows at scroll=0. Deferred to next frame so layout has settled.
function applyStickyOffsets(){
  requestAnimationFrame(function(){
    var root=document.documentElement;
    var hdr=document.querySelector('.page-header-sticky');
    var hdrH=hdr?hdr.offsetHeight:150;
    root.style.setProperty('--page-header-h',hdrH+'px');
    var tb=document.querySelector('.grade-toolbar');
    var tbH=tb?tb.offsetHeight:0;
    root.style.setProperty('--toolbar-h',tbH+'px');
    // Overlap sticky-thead onto the real thead in the table. At scroll=0
    // the sticky-thead sits at its natural in-flow position; the negative
    // margin pulls .table-wrap up by exactly the real thead's height so
    // the two header rows occupy the same vertical band. The sticky-thead
    // has higher z-index so the real thead is hidden beneath it.
    var sticky=document.querySelector('.sticky-thead');
    var realThead=document.querySelector('.table-wrap thead');
    if(sticky&&realThead){
      var th=realThead.offsetHeight;
      if(th>0)sticky.style.marginBottom=(-th)+'px';
    }
  });
}
window.addEventListener('resize',function(){applyStickyOffsets();});

render();

/* Data-freshness footer */
(function(){
  var n=new Date();n.setMinutes(0,0,0);
  var t=n.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  var f=document.getElementById('app-footer');
  if(f)f.textContent='Data updates at the top of every hour · Last updated '+t+' · Refresh to see new data.';
})();

/* Re-render on color-scheme change so bar colors track the theme */
if(window.matchMedia){
  var mq=window.matchMedia('(prefers-color-scheme: dark)');
  if(mq.addEventListener)mq.addEventListener('change',render);
  else if(mq.addListener)mq.addListener(render);
}
</script>
